name: CI

env:
  NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - "release-please--*"
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      deploy_pages:
        description: "Build and deploy docs site to GitHub Pages"
        required: false
        type: boolean
        default: true
      publish_grid:
        description: "Publish @toolbox-web/grid to npm"
        required: false
        type: boolean
        default: false
      publish_grid_react:
        description: "Publish @toolbox-web/grid-react to npm"
        required: false
        type: boolean
        default: false
      publish_grid_angular:
        description: "Publish @toolbox-web/grid-angular to npm"
        required: false
        type: boolean
        default: false
      publish_grid_vue:
        description: "Publish @toolbox-web/grid-vue to npm"
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name == 'workflow_dispatch' && 'release' || 'default' }}
  cancel-in-progress: ${{ github.event_name != 'workflow_dispatch' }}

jobs:
  # ============================================
  # SETUP: Detect if this is a release-please merge commit
  # ============================================
  setup:
    runs-on: ubuntu-latest
    outputs:
      is_release_merge: ${{ steps.check.outputs.is_release_merge }}
      should_validate: ${{ steps.check.outputs.should_validate }}
    steps:
      - id: check
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          IS_RELEASE_MERGE="false"
          SHOULD_VALIDATE="false"

          # Check if this is a release-please merge commit
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/main" ]]; then
            if [[ "$COMMIT_MSG" == "chore(main): release"* ]] || [[ "$COMMIT_MSG" == "chore: release"* ]]; then
              IS_RELEASE_MERGE="true"
              echo "🚀 Detected release-please merge commit - skipping test/build"
            fi
          fi

          # Determine if we should run validation (test/build)
          # Run on: PRs, release-please branches, or regular pushes to main (not release merges)
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            SHOULD_VALIDATE="true"
          elif [[ "${{ github.ref }}" == refs/heads/release-please--* ]]; then
            SHOULD_VALIDATE="true"
          elif [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/main" && "$IS_RELEASE_MERGE" == "false" ]]; then
            SHOULD_VALIDATE="true"
          fi

          echo "is_release_merge=$IS_RELEASE_MERGE" >> $GITHUB_OUTPUT
          echo "should_validate=$SHOULD_VALIDATE" >> $GITHUB_OUTPUT

  # ============================================
  # VALIDATION: Test and Build (skipped for release-please merges)
  # ============================================
  test:
    needs: setup
    if: needs.setup.outputs.should_validate == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install

      # Set up Nx for affected commands
      - uses: nrwl/nx-set-shas@v4
        id: nx-shas

      - name: Run linting (affected)
        run: bun nx affected -t lint --quiet --base=${{ steps.nx-shas.outputs.base }} --head=${{ steps.nx-shas.outputs.head }}

      - name: Run tests (affected)
        run: bun nx affected -t test --exclude='demo-*' --base=${{ steps.nx-shas.outputs.base }} --head=${{ steps.nx-shas.outputs.head }}

  build:
    needs: setup
    if: needs.setup.outputs.should_validate == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install

      # Set up Nx for affected commands
      - uses: nrwl/nx-set-shas@v4
        id: nx-shas

      - name: Build affected libraries
        run: bun nx affected -t build --base=${{ steps.nx-shas.outputs.base }} --head=${{ steps.nx-shas.outputs.head }}

  # ============================================
  # E2E: Cross-Framework Visual Regression Tests
  # Runs demos against BUILT packages (dist/) to validate releases
  # ============================================
  e2e:
    needs: [setup]
    if: needs.setup.outputs.should_validate == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # Disable Nx interactive prompts for CI
      NX_INTERACTIVE: "false"
      NX_DAEMON: "false"
      # Run demos against built dist packages
      USE_DIST: "true"
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install

      - name: Build libraries
        run: bun run build

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Start demo servers (against dist)
        run: |
          # Demos use USE_DIST=true env to resolve from dist/ instead of source
          bun nx run demo-vanilla:serve:dist &
          bun nx run demo-react:serve:dist &
          bun nx run demo-angular:serve:dist &
          bun nx run demo-vue:serve:dist &
          # Wait for all servers to be ready
          bunx wait-on http://localhost:4000 http://localhost:4300 http://localhost:4200 http://localhost:4100 --timeout 120000

      - name: Run E2E tests
        run: bun run e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  # ============================================
  # RELEASE PLEASE
  # - Runs after test/build/e2e on regular pushes to main
  # - Runs immediately on release-please merges (skips test/build/e2e)
  # - Also runs on release events and workflow_dispatch
  # ============================================
  release-please:
    needs: [setup, test, build, e2e]
    if: |
      always() && !cancelled() &&
      (github.event_name == 'release' || github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main' && (
        needs.setup.outputs.is_release_merge == 'true' ||
        (needs.test.result == 'success' && needs.build.result == 'success' && (needs.e2e.result == 'success' || needs.e2e.result == 'skipped'))
      ))
    runs-on: ubuntu-latest
    outputs:
      # Grid package outputs
      grid_release_created: ${{ steps.release.outputs['libs/grid--release_created'] }}
      grid_tag_name: ${{ steps.release.outputs['libs/grid--tag_name'] }}
      grid_version: ${{ steps.release.outputs['libs/grid--version'] }}
      # Grid-angular package outputs
      grid_angular_release_created: ${{ steps.release.outputs['libs/grid-angular--release_created'] }}
      grid_angular_tag_name: ${{ steps.release.outputs['libs/grid-angular--tag_name'] }}
      grid_angular_version: ${{ steps.release.outputs['libs/grid-angular--version'] }}
      # Grid-react package outputs
      grid_react_release_created: ${{ steps.release.outputs['libs/grid-react--release_created'] }}
      grid_react_tag_name: ${{ steps.release.outputs['libs/grid-react--tag_name'] }}
      grid_react_version: ${{ steps.release.outputs['libs/grid-react--version'] }}
      # Grid-vue package outputs
      grid_vue_release_created: ${{ steps.release.outputs['libs/grid-vue--release_created'] }}
      grid_vue_tag_name: ${{ steps.release.outputs['libs/grid-vue--tag_name'] }}
      grid_vue_version: ${{ steps.release.outputs['libs/grid-vue--version'] }}
      # Any release created (for jobs that run on any release)
      releases_created: ${{ steps.release.outputs.releases_created }}
    steps:
      - uses: googleapis/release-please-action@v4
        if: github.event_name == 'push'
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # ============================================
  # RELEASE JOBS (runs on release published, release-please creates a release, or manual workflow_dispatch with release=true)
  # ============================================
  build-docs:
    if: |
      always() && !cancelled() && (
        github.event_name == 'release' ||
        needs.release-please.outputs.grid_release_created == 'true' ||
        (github.event_name == 'workflow_dispatch' && inputs.deploy_pages == true && github.ref == 'refs/heads/main')
      )
    needs: [release-please]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install

      - name: Build docs site
        run: bun nx build docs

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/docs/dist

  deploy-pages:
    if: |
      always() && !cancelled() && (
        github.event_name == 'release' ||
        needs.release-please.outputs.grid_release_created == 'true' ||
        (github.event_name == 'workflow_dispatch' && inputs.deploy_pages == true && github.ref == 'refs/heads/main')
      )
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: [release-please, build-docs]
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  publish-grid:
    if: |
      always() && !cancelled() && (
        github.event_name == 'release' ||
        needs.release-please.outputs.grid_release_created == 'true' ||
        (github.event_name == 'workflow_dispatch' && inputs.publish_grid == true && github.ref == 'refs/heads/main')
      )
    needs: [release-please]
    runs-on: ubuntu-latest
    environment: NPM
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install

      - name: Build grid library
        run: bun nx build grid

      - name: Generate custom elements manifest
        run: bun run cem

      - name: Publish @toolbox-web/grid to npm
        run: |
          cd dist/libs/grid
          npm publish --provenance

  publish-grid-angular:
    if: |
      always() && !cancelled() && (
        github.event_name == 'release' ||
        needs.release-please.outputs.grid_angular_release_created == 'true' ||
        (github.event_name == 'workflow_dispatch' && inputs.publish_grid_angular == true && github.ref == 'refs/heads/main')
      )
    needs: [release-please]
    runs-on: ubuntu-latest
    environment: NPM
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install

      - name: Build grid-angular library
        run: bun nx build grid-angular

      - name: Publish @toolbox-web/grid-angular to npm
        run: |
          cd dist/libs/grid-angular
          npm publish --provenance

  publish-grid-react:
    if: |
      always() && !cancelled() && (
        github.event_name == 'release' ||
        needs.release-please.outputs.grid_react_release_created == 'true' ||
        (github.event_name == 'workflow_dispatch' && inputs.publish_grid_react == true && github.ref == 'refs/heads/main')
      )
    needs: [release-please]
    runs-on: ubuntu-latest
    environment: NPM
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install

      - name: Build grid-react library
        run: bun nx build grid-react

      - name: Publish @toolbox-web/grid-react to npm
        run: |
          cd dist/libs/grid-react
          npm publish --provenance

  publish-grid-vue:
    if: |
      always() && !cancelled() && (
        github.event_name == 'release' ||
        needs.release-please.outputs.grid_vue_release_created == 'true' ||
        (github.event_name == 'workflow_dispatch' && inputs.publish_grid_vue == true && github.ref == 'refs/heads/main')
      )
    needs: [release-please]
    runs-on: ubuntu-latest
    environment: NPM
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install

      - name: Build grid-vue library
        run: bun nx build grid-vue

      - name: Publish @toolbox-web/grid-vue to npm
        run: |
          cd dist/libs/grid-vue
          npm publish --provenance
